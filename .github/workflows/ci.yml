name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: npm install --ignore-scripts

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Smoke test dry-run install
        run: node bin/tokenmaxxing-ai.js install --dry-run --target all

      - name: Smoke test project install with verification
        run: node bin/tokenmaxxing-ai.js install --yes --verify --dir .tmp-install --target all

      - name: Smoke test user install with verification
        run: node bin/tokenmaxxing-ai.js install --yes --verify --dir .tmp-install-user --scope user --target codex
        env:
          TOKENMAXXING_AI_HOME: .tmp-home
